# Prometheus Configuration
#
# Base configuration with self-monitoring only.
# For cloud-specific service discovery, see the SD-specific config files
# (prometheus-azure-sd.yml, etc.) and merge at deployment time.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
