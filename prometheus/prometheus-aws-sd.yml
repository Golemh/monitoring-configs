# Prometheus Configuration — AWS EC2 Service Discovery
#
# Uses EC2 SD for auto-discovering Kafka instances.
# Authentication via IAM Instance Profile (no secrets needed).
#
# Required variable (injected by cloud-init sed):
#   AWS_REGION — AWS region for EC2 SD

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Kafka instances discovered via EC2 Service Discovery
  - job_name: 'kafka'
    scrape_interval: 60s
    scrape_timeout: 45s
    ec2_sd_configs:
      - region: ${AWS_REGION}
        port: 7071

    relabel_configs:
      # Only scrape instances tagged with role=kafka
      - source_labels: [__meta_ec2_tag_role]
        regex: kafka
        action: keep
      # Use instance Name tag as instance label
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      # Add VPC ID label
      - source_labels: [__meta_ec2_vpc_id]
        target_label: vpc_id
      # Use private IP for scraping (instances are in the same VPC)
      - source_labels: [__meta_ec2_private_ip]
        replacement: '${1}:7071'
        target_label: __address__

  # Node exporter on all project VMs — system metrics (CPU, memory, disk, network)
  - job_name: 'node'
    ec2_sd_configs:
      - region: ${AWS_REGION}
        port: 9100

    relabel_configs:
      # Only scrape instances tagged with Project=kafka
      - source_labels: [__meta_ec2_tag_Project]
        regex: kafka
        action: keep
      # Use instance Name tag as instance label
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      # Add role label from EC2 tag
      - source_labels: [__meta_ec2_tag_role]
        target_label: role
      # Use private IP for scraping
      - source_labels: [__meta_ec2_private_ip]
        replacement: '${1}:9100'
        target_label: __address__

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
