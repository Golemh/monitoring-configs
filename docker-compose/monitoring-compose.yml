# Monitoring Stack Docker Compose
#
# Extracted from Terraform cloud-init (monitoring_setup.tftpl).
# Terraform template variables replaced with environment variables.
#
# Required env vars:
#   MONITORING_USER_HOME    — Home directory of the deploy user
#   GRAFANA_ADMIN_PASSWORD  — Grafana admin password
#
# Optional:
#   PROMETHEUS_RETENTION    — Data retention period (default: 15d)
#   (Loki has no extra env vars — config is fully file-based)

services:
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ${MONITORING_USER_HOME}/monitoring-configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}'
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '0.5'
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ${MONITORING_USER_HOME}/monitoring-configs/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - /data/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.25'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - /data/grafana:/var/lib/grafana
      - ${MONITORING_USER_HOME}/monitoring-configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${MONITORING_USER_HOME}/monitoring-configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.25'
    depends_on:
      - prometheus
    restart: unless-stopped
